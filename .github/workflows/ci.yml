name: CI

on:
  push:
    branches:
      - main

  pull_request:
    branches:
      - main

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: setup pnpm
        uses: pnpm/action-setup@0ebf47130e4866e96fce0953f49152a61190b271 # v6.0.9

      - name: setup node
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: 24

      - name: install dependencies
        run: pnpm install --frozen-lockfile

      - name: build
        run: pnpm build

      # `build` only writes gitignored dist/, so a bare `git diff` can never see
      # drift of committed generated artifacts. Re-run the real generators for the
      # tracked outputs (packages/core/src/generated/*.ts + docs/api/*.md) and fail
      # if the working tree changed. Both generators are idempotent on a clean tree.
      - name: check for uncommitted codegen drift (css-data + api docs)
        id: codegen-drift
        run: |
          pnpm generate:core:css
          pnpm maintain-docs:gen-api
          git diff --exit-code
          if [ -n "$(git status --porcelain)" ]; then
            echo "::error::Committed generated outputs are out of date. Run 'pnpm generate:core:css' and 'pnpm maintain-docs:gen-api', then commit the result."
            git status --porcelain
            exit 1
          fi

      - name: upload regenerated outputs for codegen drift diagnosis
        if: failure() && steps.codegen-drift.outcome == 'failure'
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: codegen-drift-${{ github.sha }}
          path: |
            docs/api/*.md
            packages/core/src/generated/*.ts
          if-no-files-found: error
          retention-days: 1

      - name: check documentation implementation contracts
        run: pnpm maintain-docs:check-contracts

      - name: check publish correctness (publint + are-the-types-wrong)
        run: pnpm publint && pnpm attw

      - name: real vite build e2e
        run: pnpm test:e2e

      - name: lint files
        run: pnpm lint

      - name: typecheck
        run: pnpm typecheck

      - name: build docs (dead-link check)
        run: pnpm docs:build

      # Blocking (Decision D4). The linter only scans docs/zh-tw/**, so it is
      # inherently scoped to the translation locale.
      - name: i18n lint (zh-tw terminology + anchors + fixtures)
        run: pnpm maintain-i18n:lint

      # Non-blocking visibility summary: translation freshness is a workflow
      # signal, not a defect (Decision D4).
      - name: i18n status (zh-tw freshness summary)
        run: pnpm maintain-i18n:status
        continue-on-error: true

  test:
    runs-on: ${{ matrix.os }}

    strategy:
      matrix:
        node: [22, 24]
        os: [ubuntu-latest, windows-latest, macos-latest]
      fail-fast: false

    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: setup pnpm
        uses: pnpm/action-setup@0ebf47130e4866e96fce0953f49152a61190b271 # v6.0.9

      - name: setup node
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: ${{ matrix.node }}

      - name: install dependencies
        run: pnpm install --frozen-lockfile

      - name: build
        run: pnpm build

      - name: test
        run: pnpm test
