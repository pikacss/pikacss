name: Update tooling lockfile

on:
  push:
    branches:
      - agent/upgrade-deviltea-configs

permissions:
  contents: write

concurrency:
  group: update-tooling-lockfile
  cancel-in-progress: false

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          ref: agent/upgrade-deviltea-configs

      - name: setup pnpm
        uses: pnpm/action-setup@0ebf47130e4866e96fce0953f49152a61190b271 # v6.0.9

      - name: setup node
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: 24

      - name: update lockfile
        run: pnpm install --lockfile-only --no-frozen-lockfile

      - name: commit lockfile
        shell: bash
        run: |
          if git diff --quiet -- pnpm-lock.yaml; then
            exit 0
          fi
          git config user.name github-actions[bot]
          git config user.email 41898282+github-actions[bot]@users.noreply.github.com
          git add pnpm-lock.yaml
          git commit -m "chore: update lockfile for tooling upgrades"
          git push
