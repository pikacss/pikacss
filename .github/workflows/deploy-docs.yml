name: Deploy docs to pikacss.github.io

on:
  push:
    branches: [main]

  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: deploy-docs
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          fetch-depth: 0

      - name: setup pnpm
        uses: pnpm/action-setup@f40ffcd9367d9f12939873eb1018b921a783ffaa # v4

      - name: setup node
        uses: actions/setup-node@53b83947a5a98c8d113130e565377fae1a50d02f # v6
        with:
          node-version: 24

      - name: install dependencies
        run: pnpm install --frozen-lockfile

      - name: build
        run: pnpm build && pnpm docs:build

      - name: push dist to pikacss.github.io
        env:
          DOCS_DEPLOY_TOKEN: ${{ secrets.DOCS_DEPLOY_TOKEN }}
          TARGET_REPO: https://x-access-token:${{ secrets.DOCS_DEPLOY_TOKEN }}@github.com/pikacss/pikacss.github.io.git
        run: |
          set -eu

          dist_dir="docs/.vitepress/dist"
          rm -rf "$dist_dir/.git"
          touch "$dist_dir/.nojekyll"

          cd "$dist_dir"
          git init --initial-branch=main
          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git add --all
          git commit -m "Deploy docs from ${GITHUB_SHA}"

          git remote add origin "$TARGET_REPO"
          git push --force origin HEAD:main
