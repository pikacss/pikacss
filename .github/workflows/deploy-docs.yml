name: Deploy docs to pikacss.github.io

on:
  push:
    branches: [main]

  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: deploy-docs
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          fetch-depth: 0

      - name: setup pnpm
        uses: pnpm/action-setup@0ebf47130e4866e96fce0953f49152a61190b271 # v6.0.9

      - name: setup node
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: 24

      - name: install dependencies
        run: pnpm install --frozen-lockfile

      - name: build
        run: pnpm build && pnpm docs:build && pnpm playground:build

      - name: push dist to pikacss.github.io
        env:
          DOCS_DEPLOY_TOKEN: ${{ secrets.DOCS_DEPLOY_TOKEN }}
          TARGET_REPO: https://x-access-token:${{ secrets.DOCS_DEPLOY_TOKEN }}@github.com/pikacss/pikacss.github.io.git
        run: |
          set -eu

          dist_dir="docs/.vitepress/dist"
          rm -rf "$dist_dir/.git"
          touch "$dist_dir/.nojekyll"

          # Serve the playground under /playground/ next to the docs.
          rm -rf "$dist_dir/playground"
          cp -R playground/dist "$dist_dir/playground"

          cd "$dist_dir"
          git init --initial-branch=main
          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git add --all
          git commit -m "Deploy docs from ${GITHUB_SHA}"

          git remote add origin "$TARGET_REPO"
          git push --force origin HEAD:main
