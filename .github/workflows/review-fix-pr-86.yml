name: Review Fix PR 86

on:
  push:
    branches:
      - agent/fix-docs-implementation-drift

permissions:
  contents: write

jobs:
  patch-generated-docs:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          ref: agent/fix-docs-implementation-drift

      - name: setup pnpm
        uses: pnpm/action-setup@0ebf47130e4866e96fce0953f49152a61190b271 # v6.0.9

      - name: setup node
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: 24

      - name: install dependencies
        run: pnpm install --frozen-lockfile

      - name: patch drifting JSDoc and regenerate API docs
        run: |
          python - <<'PY'
          from pathlib import Path

          path = Path('packages/unplugin/src/index.ts')
          source = path.read_text()
          old = ' * @returns An unplugin hooks object consumed by Vite, webpack, Rollup, esbuild, and Rspack.'
          new = ' * @returns An unplugin hooks object consumed by the exported bundler adapters.'
          if old not in source:
              raise SystemExit('Expected unpluginFactory @returns JSDoc was not found')
          path.write_text(source.replace(old, new, 1))
          PY
          pnpm maintain-docs:gen-api

      - name: commit generated review fix
        run: |
          git config user.name github-actions[bot]
          git config user.email 41898282+github-actions[bot]@users.noreply.github.com
          git add packages/unplugin/src/index.ts docs/api/unplugin.md
          git diff --cached --exit-code && exit 0
          git commit -m "docs(unplugin): avoid adapter list drift"
          git push origin HEAD:agent/fix-docs-implementation-drift
