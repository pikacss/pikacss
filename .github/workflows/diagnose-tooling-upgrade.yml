name: Diagnose tooling upgrade

on:
  pull_request:
    branches:
      - main

permissions:
  contents: read

jobs:
  diagnose:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: setup pnpm
        uses: pnpm/action-setup@0ebf47130e4866e96fce0953f49152a61190b271 # v6.0.9

      - name: setup node
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: 24

      - name: install dependencies
        run: pnpm install --frozen-lockfile

      - name: build packages
        run: pnpm build

      - name: capture diagnostics
        id: diagnostics
        shell: bash
        run: |
          set +e
          pnpm typecheck > ci-typecheck.log 2>&1
          typecheck_status=$?
          pnpm test > ci-test.log 2>&1
          test_status=$?
          echo "typecheck_status=$typecheck_status" >> "$GITHUB_OUTPUT"
          echo "test_status=$test_status" >> "$GITHUB_OUTPUT"
          exit 0

      - name: upload diagnostics
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: tooling-upgrade-diagnostics
          path: |
            ci-typecheck.log
            ci-test.log
          if-no-files-found: error
          retention-days: 1

      - name: propagate failures
        if: steps.diagnostics.outputs.typecheck_status != '0' || steps.diagnostics.outputs.test_status != '0'
        run: exit 1
