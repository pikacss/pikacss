blockExoticSubdeps: true

minimumReleaseAge: 4320
minimumReleaseAgeExclude:
  - '@webref/css'
  - '@mdn/browser-compat-data'
  - '@mdn/data'
  - web-features
  - '@deviltea/eslint-config'
  - '@deviltea/tsconfig'

shellEmulator: true

strictDepBuilds: true

trustPolicy: no-downgrade
trustPolicyExclude:
  # semver@6.3.1 (latest 6.x, required by @babel/core via `^6.3.1`) predates npm
  # provenance for the 6.x line; the "downgrade" is a publish-date false positive.
  - semver@6.3.1
packages:
  - docs
  - demo
  - packages/*
catalog:
  '@clack/prompts': ^1.6.0
  '@deviltea/eslint-config': ^8.0.2
  '@deviltea/tsconfig': ^0.0.10
  '@iconify-json/line-md': ^1.2.16
  '@iconify/utils': ^3.1.3
  '@mdn/browser-compat-data': ^8.0.5
  '@nuxt/kit': ^4.4.8
  '@nuxt/schema': ^4.4.8
  '@shikijs/vitepress-twoslash': ^3.23.0
  '@types/node': ^24.13.2
  '@vitejs/plugin-vue': ^6.0.7
  '@vitest/coverage-v8': ^4.1.9
  '@webref/css': ^8.6.1
  alien-signals: ^3.2.1
  bumpp: ^11.1.0
  esbuild: ^0.28.1
  eslint: ^10.6.0
  globby: ^16.2.0
  gray-matter: ^4.0.3
  happy-dom: ^20.10.6
  jiti: ^2.7.0
  klona: ^2.0.6
  lint-staged: ^16.4.0
  local-pkg: ^1.2.1
  magic-string: ^0.30.21
  mdn-data: ^2.28.1
  mermaid: ^11.16.0
  ofetch: ^1.5.1
  pathe: ^2.0.3
  perfect-debounce: ^2.1.0
  pkg-pr-new: ^0.0.75
  publint: ^0.3.21
  repomix: ^1.16.0
  simple-git-hooks: ^2.13.1
  strip-literal: ^3.1.0
  tsdown: 0.21.7
  tsx: ^4.22.5
  typescript: ^5.9.3
  unplugin: ^3.3.0
  vite: ^8.1.3
