blockExoticSubdeps: true

minimumReleaseAge: 4320
minimumReleaseAgeExclude:
  - '@webref/css'
  - '@mdn/browser-compat-data'
  - '@mdn/data'
  - web-features
  - '@deviltea/eslint-config'
  - '@deviltea/tsconfig'

shellEmulator: true

strictDepBuilds: true

trustPolicy: no-downgrade
trustPolicyExclude:
  # semver@6.3.1 (latest 6.x, required by @babel/core via `^6.3.1`) predates npm
  # provenance for the 6.x line; the "downgrade" is a publish-date false positive.
  - semver@6.3.1
packages:
  - docs
  - demo
  - playground
  - packages/*
catalog:
  '@arethetypeswrong/cli': ^0.18.5
  '@babel/parser': ^7.29.7
  '@babel/traverse': ^7.29.7
  '@babel/types': ^7.29.7
  '@clack/prompts': ^1.6.0
  '@deviltea/eslint-config': ^8.0.2
  '@deviltea/tsconfig': ^0.0.10
  '@iconify-json/line-md': ^1.2.16
  '@iconify-json/vscode-icons': ^1.2.37
  '@iconify/utils': ^3.1.3
  '@mdn/browser-compat-data': ^8.0.5
  '@nuxt/kit': ^4.4.8
  '@nuxt/schema': ^4.4.8
  '@shikijs/core': ^4.3.1
  '@shikijs/engine-javascript': ^4.3.1
  '@shikijs/langs': ^4.3.1
  '@shikijs/monaco': ^4.3.1
  '@shikijs/themes': ^4.3.1
